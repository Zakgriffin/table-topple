<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>De Bruijn Torus Tracker</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; }
  canvas#c {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  canvas#c.mirror {
    transform: translate(-50%, -50%) scaleX(-1);
  }
  #status {
    position: fixed; top: 10px; left: 10px; color: #0f0;
    font-family: monospace; font-size: 14px; white-space: pre;
    text-shadow: 0 0 3px #000, 0 0 3px #000;
  }
  #switchCam {
    position: fixed; bottom: 16px; right: 16px; z-index: 10;
    padding: 10px 14px; border-radius: 999px; border: none;
    background: rgba(255,255,255,0.15); color: white;
    font-family: monospace; font-size: 14px; backdrop-filter: blur(4px);
  }
  #switchCam:active { background: rgba(255,255,255,0.3); }
  #zoomBox {
    position: fixed; bottom: 16px; left: 16px; right: 90px; z-index: 10;
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.15); backdrop-filter: blur(4px);
    border-radius: 999px; padding: 6px 14px;
  }
  #zoomLabel { color: white; font-family: monospace; font-size: 12px; white-space: nowrap; }
  #zoom { flex: 1; accent-color: #0f0; }
  #zoom:disabled { accent-color: #f00; opacity: 0.5; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="status">Starting camera...</div>
<div id="zoomBox">
  <span id="zoomLabel">Zoom</span>
  <input type="range" id="zoom" min="0" max="1" step="0.01" value="0" disabled>
</div>
<button id="switchCam" title="Switch camera">⟲ Flip camera</button>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
