<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>De Bruijn Torus Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; background: #0a0a0f; color: #eee;
    font-family: monospace; display: flex; align-items: center; justify-content: center;
  }
  .wrap { max-width: 640px; padding: 40px; }
  h1 { font-size: 22px; margin-bottom: 8px; }
  p.sub { color: #999; font-size: 13px; margin-bottom: 32px; }
  .cards { display: flex; gap: 20px; flex-wrap: wrap; }
  a.card {
    flex: 1; min-width: 240px; display: block; text-decoration: none; color: inherit;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px; padding: 22px; transition: background 0.15s, border-color 0.15s;
  }
  a.card:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.35); }
  a.card h2 { font-size: 16px; margin-bottom: 8px; color: #fff; }
  a.card p { font-size: 12px; color: #aaa; line-height: 1.5; }
  a.card .tag { display: inline-block; margin-top: 12px; font-size: 11px; color: #6c9; }
</style>
</head>
<body>
<div class="wrap">
  <h1>De Bruijn Torus</h1>
  <p class="sub">Pick a page.</p>
  <div class="cards">
    <a class="card" href="/tracker.html">
      <h2>Tracker</h2>
      <p>Live camera pipeline: capture &rarr; grid decode &rarr; homography &rarr; overlays. Real-world testing.</p>
      <span class="tag">&rarr; tracker.html</span>
    </a>
    <a class="card" href="/sphere-lab.html">
      <h2>Great Sphere Lab</h2>
      <p>Three.js testbed: virtual floor pattern, movable camera, and the vanishing-point sphere from the inside.</p>
      <span class="tag">&rarr; sphere-lab.html</span>
    </a>
  </div>
</div>
</body>
</html>
