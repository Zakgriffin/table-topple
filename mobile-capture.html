<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sphere Lab — Mobile Capture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #000; overflow: hidden; height: 100%; }
  video#v {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    max-width: 100vw; max-height: 100vh;
  }
  video#v.mirror { transform: translate(-50%, -50%) scaleX(-1); }
  #status {
    position: fixed; top: max(12px, env(safe-area-inset-top)); left: 12px; right: 12px;
    display: flex; justify-content: space-between; z-index: 10;
    font-family: monospace; font-size: 13px;
    text-shadow: 0 0 6px #000, 0 0 6px #000;
  }
  #camStatus { color: #0f0; }
  #relayStatus { color: #6cf; }
  #relayStatus.down { color: #f66; }
  #shutter {
    position: fixed; bottom: max(36px, calc(env(safe-area-inset-bottom) + 24px)); left: 50%;
    transform: translateX(-50%); z-index: 10;
    width: 84px; height: 84px; border-radius: 50%;
    border: 4px solid #fff; background: rgba(255,255,255,0.2);
    backdrop-filter: blur(4px); transition: background 0.15s ease;
  }
  #shutter:active { background: rgba(255,255,255,0.45); }
  #shutter.sent { background: rgba(60,220,110,0.75); border-color: #6f6; }
  #switchCam {
    position: fixed; bottom: max(52px, calc(env(safe-area-inset-bottom) + 40px)); right: 24px; z-index: 10;
    width: 52px; height: 52px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.15); color: #fff; font-size: 22px;
    backdrop-filter: blur(4px);
  }
  #zoomBox {
    position: fixed; bottom: max(150px, calc(env(safe-area-inset-bottom) + 138px)); left: 24px; right: 24px; z-index: 10;
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.15); backdrop-filter: blur(4px);
    border-radius: 999px; padding: 10px 20px;
  }
  #zoomBox span { color: #fff; font-family: monospace; font-size: 13px; }
  #zoom { flex: 1; accent-color: #0f0; height: 20px; }
  #zoom:disabled { accent-color: #f00; opacity: 0.5; }
  #homeLink {
    position: fixed; top: max(12px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); z-index: 20;
    color: #6c9; font-family: monospace; font-size: 12px; text-decoration: none;
    background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 999px;
  }
</style>
</head>
<body>
<a id="homeLink" href="/">&larr; home</a>
<video id="v" autoplay playsinline muted></video>
<canvas id="captureCanvas" style="display:none;"></canvas>
<div id="status"><span id="camStatus">starting camera…</span><span id="relayStatus">relay: connecting…</span></div>
<div id="zoomBox"><span>zoom</span><input type="range" id="zoom" min="0" max="1" step="0.01" value="0" disabled></div>
<button id="switchCam" title="switch camera">&#8635;</button>
<button id="shutter" title="capture and send to Sphere Lab"></button>
<script type="module" src="/src/mobileCapture.ts"></script>
</body>
</html>
